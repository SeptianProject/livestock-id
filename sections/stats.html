<!-- Stats Counter -->
<section class="ls-stats py-5">
  <div class="container">
    <div class="row g-4 text-center">
      <div class="col-6 col-md-3">
        <div class="ls-stat-item">
          <div class="ls-stat-number" data-target="10000">0</div>
          <div class="ls-stat-suffix">+</div>
          <div class="ls-stat-label">Data Ternak Terpantau</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="ls-stat-item">
          <div class="ls-stat-number" data-target="50">0</div>

          <div class="ls-stat-label">Mitra Peternakan</div>

      </div>
      <div class="col-6 col-md-3">
        <div class="ls-stat-item">
          <div class="ls-stat-number" data-target="99">0</div>
          <div class="ls-stat-suffix">%</div>
          <div class="ls-stat-label">Akurasi Data Produksi</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="ls-stat-item">
          <div class="ls-stat-number ls-stat-text">24/7</div>

        </div>
      </div>
    </div>
