<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body>
    <section class="container py-4">
      <div class="row gap-4">
        <!-- sidebar -->
        <aside class="col-4 w-auto bg-warning">
          <div
            class="p-2 rounded-3 mb-4 d-flex align-items-center justify-content-center">
            <h5 class="text-primary">Livestock ID</h5>
          </div>
          <div class="d-flex flex-column gap-4">
            <div class="col">
              <a
                href="#overview"
                data-bs-toggle="collapse"
                data-bs-target="#overview"
                class="btn btn-primary"
                >Overview</a
              >
            </div>
            <div class="col">
              <button
                href="#ternak"
                data-bs-toggle="collapse"
                data-bs-target="#ternak"
                class="btn">
                Ternak
              </button>
            </div>
            <div class="col">
              <a
                href="#kandang"
                data-bs-toggle="collapse"
                data-bs-target="#kandang"
                class="btn"
                >Kandang</a
              >
            </div>
            <div class="col">
              <a href="#petugas" class="btn">Petugas</a>
            </div>
            <div class="col">
              <a href="#rekam-kesehatan" class="btn">Rekam Kesehatan</a>
            </div>
            <div class="col">
              <a href="#catatan-produksi" class="btn">Catatan Produksi</a>
            </div>
          </div>
        </aside>

        <!-- main view kandang -->
        <main class="col-8 collapse" id="kandang">
          <h1 class="h4">Tambah Kandang</h1>
          <form action="" method="POST" class="row gap-4">
            <div class="row">
              <div class="col">
                <label for="namaKandang" class="form-label">Nama Kandang</label>
                <input type="text" class="form-control" id="namaKandang" />
              </div>
              <div class="col">
                <label for="lokasi" class="form-label">Lokasi</label>
                <input type="text" class="form-control" id="lokasi" />
              </div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                Tambah Kandang
              </button>
              <button type="button" class="btn btn-outline-primary">
                Tambah dan Buat Baru
              </button>
              <button type="button" class="btn btn-outline-secondary">
                Batal
              </button>
            </div>
          </form>
        </main>

        <!-- main view ternak-->
        <main class="col-8 collapse bg-warning" id="ternak">
          <h1 class="h4">Tambah Ternak</h1>
          <form action="" method="POST" class="row gap-4">
            <div class="row">
              <div class="col">
                <label for="namaTernak" class="form-label">Nama Ternak</label>
                <input type="text" class="form-control" id="namaTernak" />
              </div>
              <div class="col">
                <label for="tanggalLahir" class="form-label"
                  >Tanggal Lahir</label
                >
                <input type="date" class="form-control" id="tanggalLahir" />
              </div>
            </div>
            <div class="row">
              <div class="col">
                <label for="jenisKelamin" class="form-label"
                  >Jenis Kelamin</label
                >
                <select name="" id="jenisKelamin" class="form-select">
                  <option value="jantan">Jantan</option>
                  <option value="betina">Betina</option>
                </select>
              </div>
              <div class="col">
                <label for="idKandang" class="form-label">ID Kandang</label>
                <input type="text" class="form-control" id="idKandang" />
              </div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                Tambah Ternak
              </button>
              <button type="button" class="btn btn-outline-primary">
                Tambah dan Buat Baru
              </button>
              <button type="button" class="btn btn-outline-secondary">
                Batal
              </button>
            </div>
          </form>
        </main>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </body>
</html>
