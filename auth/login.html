<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - LivestockID</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="container d-flex align-items-center justify-content-center min-vh-100">
      <div class="login-container">
        <div class="row g-0">
          <div class="col-md-6 login-form-section">
            <div class="brand-logo">
              <span style="color: #2e7d32">🐄 Livestock</span
              ><span style="color: #4caf50">ID</span>
            </div>

            <h2>Masuk</h2>
            <p class="subtitle">
              Selamat datang kembali! Kami sangat senang menyambut Anda kembali.
            </p>

            <form>
              <div class="mb-3">
                <label>Nama Lengkap</label>
                <input type="text" class="form-control" placeholder="" />
              </div>
              <div class="mb-3">
                <label>Kata Sandi</label>
                <input type="password" class="form-control" placeholder="" />
                <a href="#" class="forgot-password">Lupa Kata Sandi?</a>
              </div>

              <button type="submit" class="btn btn-masuk w-100">Masuk</button>
            </form>

            <p class="divider-text">Atau Anda dapat masuk menggunakan email</p>

            <button class="btn btn-google w-100">Masuk dengan Google</button>

            <p class="footer-text">
              Belum punya akun?
              <a href="#" style="color: #69b35a">Daftar sekarang!</a>
            </p>
          </div>

          <div class="col-md-6 d-none d-md-block">
            <div class="image-section"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
