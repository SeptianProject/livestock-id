<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - LivestockID</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 95%;
        }
        .login-form-section {
            padding: 40px 60px;
        }
        .brand-logo {
            font-weight: 600;
            font-size: 24px;
            color: #5cb85c;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }
        .brand-logo img {
            width: 30px;
            margin-right: 10px;
        }
        h2 {
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
        }
        .subtitle {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            height: 45px;
            border-radius: 10px;
            background: #fdfdfd;
        }
        .btn-masuk {
            background-color: #69b35a;
            color: white;
            border: none;
            height: 45px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 18px;
            margin-top: 20px;
        }
        .btn-masuk:hover {
            background-color: #56944a;
            color: white;
        }
        .btn-google {
            background-color: white;
            color: #333;
            border: 1px solid #ddd;
            height: 45px;
            border-radius: 10px;
            font-weight: 400;
            margin-top: 15px;
        }
        .forgot-password {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            display: block;
        }
        .divider-text {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin: 20px 0;
        }
        .footer-text {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 20px;
        }
        .image-section {
            background: url('https://images.unsplash.com/photo-1500595046743-cd271d694d30?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            min-height: 550px;
            border-radius: 20px;
            margin: 15px;
        }
        /* Mobile adjustment */
        @media (max-width: 767px) {
            .image-section { display: none; }
            .login-form-section { padding: 30px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-md-10 col-md-offset-1 login-container">
            <div class="row">
                <div class="col-md-6 login-form-section">
                    <div class="brand-logo">
                        <span style="color: #2e7d32;">🐄 Livestock</span><span style="color: #4caf50;">ID</span>
                    </div>

                    <h2>Masuk</h2>
                    <p class="subtitle">Selamat datang kembali! Kami sangat senang menyambut Anda kembali.</p>

                    <form>
                        <div class="form-group">
                            <label>Nama Lengkap</label>
                            <inputtype="text" class="form-control" placeholder="">
                        </div>
                        <div class="form-group">
                            <label>Kata Sandi</label>
                            <inputtype="password" class="form-control" placeholder="">
                            <a href="#" class="forgot-password">Lupa Kata Sandi?</a>
                        </div>

                        <button type="submit" class="btn btn-block btn-masuk">Masuk</button>
                    </form>

                    <p class="divider-text">Atau Anda dapat masuk menggunakan email</p>

                    <button class="btn btn-block btn-google">
                        Masuk dengan Google
                    </button>

                    <p class="footer-text">Belum punya akun? <a href="#" style="color: #69b35a;">Daftar sekarang!</a></p>
                </div>

                <div class="col-md-6 hidden-xs">
                    <div class="image-section"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
